<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Genuis Baccarat • Premium</title>

<style>
.summary{
 margin:10px auto 14px;
 padding:12px;
 max-width:520px;
 background:linear-gradient(180deg,#050505,#101010);
 border-radius:12px;
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.25);
 font-size:16px;
 line-height:1.6;
}
.summary b{color:#ffd700}

*{box-sizing:border-box}
body{
 margin:0;
 padding:12px;
 font-family:"Segoe UI",Arial;
 background:radial-gradient(circle at top,#2a2a2a 0%,#050505 65%);
 color:#eee;
}
.container{
 max-width:1450px;
 margin:auto;
 background:linear-gradient(180deg,#141414,#0b0b0b);
 padding:18px;
 border-radius:16px;
 box-shadow:0 0 40px rgba(255,215,0,.18),
 inset 0 0 0 1px rgba(255,215,0,.18);
}
h1{
 text-align:center;
 color:#ffd700;
 margin:6px 0 14px;
 letter-spacing:1px;
 text-shadow:0 0 10px rgba(255,215,0,.4);
}
.controls{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
 gap:10px;
 margin-bottom:12px;
}
button{
 padding:10px 20px;
 font-size:15px;
 font-weight:600;
 border:none;
 border-radius:10px;
 cursor:pointer;
 color:#fff;
 box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),
 0 6px 14px rgba(0,0,0,.7);
 transition:.18s;
}
button:hover{transform:translateY(-1px);opacity:.92}
.player{background:linear-gradient(#3498db,#1f4f7a)}
.banker{background:linear-gradient(#e74c3c,#7f1d1d)}
.tie{background:linear-gradient(#2ecc71,#1e8449)}
.undo{background:linear-gradient(#9b59b6,#5e3370)}
.clear{background:linear-gradient(#95a5a6,#5f6a6a)}
.stats{text-align:center;font-size:16px;margin-bottom:12px}

.road-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.road{
 background:linear-gradient(180deg,#000,#090909);
 padding:12px;
 border-radius:14px;
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.18),
 0 0 16px rgba(0,0,0,.9);
}
.road h3{text-align:center;margin:0 0 6px;font-size:15px;color:#ffd700}
.grid{
 display:grid;
 grid-template-columns:repeat(60,26px);
 grid-template-rows:repeat(6,26px);
 gap:3px;
 overflow:hidden;
}
.cell{
 width:26px;height:26px;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 font-size:13px;font-weight:bold;
 box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
}
.B{background:#c0392b}
.P{background:#2980b9}
.T{background:#27ae60;font-size:11px}

.analysis-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:14px;
}
.analysis{
 background:linear-gradient(180deg,#060606,#121212);
 padding:14px;
 border-radius:16px;
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.22),
 0 0 14px rgba(0,0,0,.9);
}
.analysis h3{margin:0 0 4px;font-size:14px;color:#ffd700}
.desc{font-size:12px;color:#bfbfbf}
.per{font-size:13px;margin-top:2px}
.best{
 color:#00ff99;
 font-weight:900;
 font-size:3em;
 text-shadow:0 0 14px rgba(0,255,153,.9);
 animation:blink .9s infinite;
}
@keyframes blink{50%{opacity:.35}}
.dna-row{font-size:15px;word-break:break-all;margin-top:4px}
/* ===== PREMIUM PROGRAM BOX ===== */
.premium-box{
 margin:18px auto;
 padding:20px;
 border-radius:22px;
 background:
   radial-gradient(circle at top left, rgba(255,215,0,.25), transparent 60%),
   linear-gradient(135deg,#1f2937,#000);
 border:1px solid rgba(255,215,0,.4);
 box-shadow:
   0 0 0 1px rgba(255,215,0,.2) inset,
   0 25px 60px rgba(0,0,0,.9);
 position:relative;
 overflow:hidden;
 text-align:center;
}

.premium-box::before{
 content:"";
 position:absolute;
 top:0;left:-40%;
 width:60%;
 height:100%;
 background:linear-gradient(120deg,transparent,rgba(255,255,255,.12),transparent);
 transform:skewX(-20deg);
 animation:shinePremium 4s infinite linear;
}

@keyframes shinePremium{
 from{left:-40%}
 to{left:120%}
}

.premium-title{
 font-size:20px;
 font-weight:900;
 color:#ffd700;
 margin-bottom:8px;
 text-shadow:0 0 12px rgba(255,215,0,.8);
}

.premium-main{
 font-size:3.5em;
 font-weight:900;
 margin:10px 0;
}

.premium-p{
 color:#3b82f6;
 text-shadow:0 0 20px rgba(59,130,246,.9);
}

.premium-b{
 color:#ef4444;
 text-shadow:0 0 20px rgba(239,68,68,.9);
}

.premium-sub{
 font-size:14px;
 color:#ccc;
 margin-top:6px;
}

.premium-percent{
 font-size:18px;
 font-weight:bold;
 color:#00ff99;
 margin-top:6px;
}

/* ===== 🤖 LOGO AI PREMIUM ===== */

.logo-title{
 display:flex;
 align-items:center;
 justify-content:center;
 gap:12px;
 position:relative;
}

/* 🤖 รูปหุ่นยนต์ */
.robot-logo{
 width:100px;
 height:80px;
 object-fit:contain;

 filter:drop-shadow(0 0 6px rgba(0,255,255,.8))
        drop-shadow(0 0 14px rgba(0,255,255,.6));

 animation:floatBot 2.5s ease-in-out infinite,
           glowBot 1.8s infinite alternate;
}

/* 🌊 ลอยนิดๆ */
@keyframes floatBot{
 0%{transform:translateY(0px)}
 50%{transform:translateY(-6px)}
 100%{transform:translateY(0px)}
}

/* ✨ กระพริบแสง */
@keyframes glowBot{
 from{
   filter:drop-shadow(0 0 4px rgba(0,255,255,.6))
          drop-shadow(0 0 10px rgba(0,255,255,.4));
 }
 to{
   filter:drop-shadow(0 0 10px rgba(0,255,255,1))
          drop-shadow(0 0 22px rgba(0,255,255,.9));
 }
}

/* 🌈 ข้อความ Genius */
.logo-text{
 font-size:24px;
 font-weight:900;

 background:linear-gradient(90deg,#ffd700,#00f0ff,#ffd700);
 background-size:200% auto;

 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;

 text-shadow:
 0 0 10px rgba(255,215,0,.7),
 0 0 20px rgba(0,255,255,.5);

 animation:shineText 4s linear infinite;
}

/* ⚡ ไล่แสง */
@keyframes shineText{
 0%{background-position:0%}
 100%{background-position:200%}
}

/* 🔥 เส้นสแกนผ่าน */
.logo-title::after{
 content:"";
 position:absolute;
 width:120%;
 height:100%;
 top:0;
 left:-120%;

 background:linear-gradient(120deg,
   transparent,
   rgba(255,255,255,.25),
   transparent);

 transform:skewX(-25deg);

 animation:scan 3.5s linear infinite;
}

@keyframes scan{
 from{left:-120%}
 to{left:120%}
}

/* ===== PREMIUM DNA GRID ===== */
.premium-dna-box{
 margin-top:14px;
 padding:12px;
 border-radius:14px;
 background:rgba(0,0,0,.6);
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.2);
}

.premium-dna-title{
 color:#ffd700;
 font-weight:700;
 margin-bottom:6px;
 font-size:13px;
 text-align:center;
}

.premium-dna-grid{
 display:flex;
 gap:4px;
 justify-content:center;
 flex-wrap:nowrap; /* ❗ ห้ามขึ้นบรรทัดใหม่ */
 overflow:hidden;
}

.dna-cell{
 width:18px;
 height:18px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:11px;
 border-radius:4px;
}

/* สี */
.dna-win{
 background:#16a34a;
 color:#fff;
 box-shadow:0 0 6px rgba(34,197,94,.7);
}

.dna-lose{
 background:#dc2626;
 color:#fff;
 box-shadow:0 0 6px rgba(239,68,68,.7);
}

/* % ต่อสาย */
.dna-percent{
 font-size:11px;
 color:#ffd700;
 margin-top:2px;
 text-align:center;
}

</style>
</head>

<body>


<!-- 🔐 LOGIN -->
<div id="loginBox" style="
 max-width:360px;
 margin:80px auto;
 padding:20px;
 background:#111;
 border-radius:14px;
 box-shadow:0 0 20px rgba(255,215,0,.3);
 text-align:center;
">
 <h2 style="color:#ffd700">🔐 LOGIN</h2>
 <input id="user" placeholder="User" style="width:100%;padding:10px;margin:6px 0;border-radius:8px"><br>
 <input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:6px 0;border-radius:8px"><br>
 <button onclick="login()" style="margin-top:10px;padding:10px 20px;border-radius:10px;background:#ffd700;font-weight:bold">
  LOGIN
 </button>
 <div id="err" style="color:red;display:none;margin-top:6px">❌ Login ผิด</div>
</div>

<div id="app" style="display:none">

<div class="container">
<h1 class="logo-title">
  <img src="robotcom2.png" class="robot-logo">
  <span class="logo-text">Genuis Baccarat 24 สาย วิศวะฯ</span>
</h1>

<div class="controls">
<button class="player" onclick="addResult('P')">PLAYER</button>
<button class="banker" onclick="addResult('B')">BANKER</button>
<button class="tie" onclick="addResult('T')">TIE</button>
<button class="undo" onclick="undo()">UNDO</button>
<button class="clear" onclick="clearAll()">CLEAR</button>
</div>

<div class="stats" id="stats"></div>



<div class="summary">
  <div id="expireShow" style="margin-bottom:6px;color:#ffd700;font-weight:bold"></div>
  <div id="summary">📊 รอข้อมูล...</div>
</div>

<!-- ⭐ วางตรงนี้เลย -->
<div class="premium-box">
  <div class="premium-title">
    👑 โปรแกรมสูตร ไม่ผูกค่าย • สายเคยผิดน้อยสุด
  </div>

  <div id="premiumPick" class="premium-main">-</div>

  <div id="premiumDetail" class="premium-sub">
    รอข้อมูล...
  </div>

  <div class="premium-dna-box">
  <div class="premium-dna-title">📊 DNA (30 ตาล่าสุด / ต่อสาย)</div>
  <div id="premiumDNA"></div>
</div>


  <div id="premiumPercent" class="premium-percent"></div>
</div>




<div class="road-wrapper">
 <div class="road">
  <h3>Bead Road</h3>
  <div class="grid" id="bead"></div>
 </div>
 <div class="road">
  <h3>Big Road</h3>
  <div class="grid" id="bigroad"></div>
 </div>
</div>

<div class="analysis-grid" id="analysisGrid"></div>
</div>

<script>

// ===== 🔒 EXPIRE SYSTEM =====
const EXPIRE_DATE = new Date(2026, 4, 09, 0, 0, 0);
// 9 พฤษภาคม พ.ศ.2569 (ค.ศ.2026)

if(new Date() > EXPIRE_DATE){
  document.body.innerHTML = `
    <div style="
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#000;
      color:#ffd700;
      font-size:22px;
      font-weight:bold;
      text-align:center;">
      ❌ โปรแกรมหมดอายุแล้ว<br>
      หมดอายุวันที่: ${EXPIRE_DATE.toLocaleDateString('th-TH')}
    </div>
  `;
  throw new Error("Program Expired");
}

// ✅ แสดงวันหมดอายุ
document.addEventListener("DOMContentLoaded", ()=>{
  const options = { day: 'numeric', month: 'long', year: 'numeric' };
  const d = EXPIRE_DATE.toLocaleDateString('th-TH', options);

  const year = d.split(" ")[2];
  const formatted = d.replace(year, "พ.ศ. " + year);

  const el = document.getElementById("expireShow");
  if(el){
    el.innerHTML = "⏳ วันหมดอายุ: " + formatted;
  }
});

function login(){
 const u=document.getElementById('user').value;
 const p=document.getElementById('pass').value;
 if(u==="1234" && p==="1234"){
   document.getElementById('loginBox').style.display="none";
   document.getElementById('app').style.display="block";
 }else{
   document.getElementById('err').style.display="block";
 }
}

let history=[]
let STRATEGY_COUNT=24
let last=Array(STRATEGY_COUNT).fill(null)
let dna=Array.from({length:STRATEGY_COUNT},()=>[])
let premiumHistory = []
let lastPremiumPick = null

function addResult(r){

  // ✅ เก็บผล Premium ก่อน
  if(r !== 'T' && lastPremiumPick){
    premiumHistory.push(lastPremiumPick === r ? '✅' : '❌')
  }

  history.push(r)

  if(r!=='T'){
    last.forEach((rec,i)=>{ if(rec) dna[i].push(rec===r?'✅':'❌') })
  }

  render()
}

function undo(){

  if(!history.length) return

  let lastResult = history.pop()

  // ✅ ลบ dna ของทุกสาย
  if(lastResult !== 'T'){
    dna.forEach(d=>{
      if(d.length) d.pop()
    })
  }

  // ✅ 🔥 ลบ premiumHistory ด้วย (สำคัญ)
  if(lastResult !== 'T'){
    if(premiumHistory.length) premiumHistory.pop()
  }

  // ❗ รีเซ็ตก่อนให้ analyze คำนวณใหม่
  lastPremiumPick = null

  render()
}

function clearAll(){
 history=[]
 last.fill(null)
 dna.forEach(d=>d.length=0)

 // ✅ เพิ่มตรงนี้
 premiumHistory = []
 lastPremiumPick = null

 document.getElementById("premiumDNA").innerHTML = "";
 render()
}

const acc=a=>a.length?Math.round(a.filter(x=>x==='✅').length/a.length*100):0
const lastOf=s=>s[s.length-1]
const opp=s=>s==='B'?'P':'B'
const cnt=(s,x)=>s.filter(v=>v===x).length

function render(){
 stats.textContent=`B:${cnt(history,'B')} | P:${cnt(history,'P')} | T:${cnt(history,'T')}`
 renderBead();renderBig();analyze()
}

function renderBead(){
 bead.innerHTML=""
 history.forEach((r,i)=>{
  let d=document.createElement("div")
  d.className="cell "+r
  d.textContent=r
  d.style.gridColumn=Math.floor(i/6)+1
  d.style.gridRow=i%6+1
  bead.appendChild(d)
 })
}

function renderBig(){
 bigroad.innerHTML=""
 let col=1,row=1,lastR=null,used={}
 history.forEach(r=>{
  if(r==='T')return
  if(lastR===null){col=1;row=1}
  else if(r===lastR){
   if(row<6 && !used[col+','+(row+1)])row++
   else col++
  }else{col++;row=1}
  used[col+','+row]=1
  let d=document.createElement("div")
  d.className="cell "+r
  d.textContent=r
  d.style.gridColumn=col
  d.style.gridRow=row
  bigroad.appendChild(d)
  lastR=r
 })
}

const strategyDefs=[
 ["Majority","ฝั่งรวม",(s)=>cnt(s,'B')>=cnt(s,'P')?'B':'P'],
 ["StreakCut","ตัดยาว",(s)=>s.slice(-3).every(v=>v===lastOf(s))?opp(lastOf(s)):lastOf(s)],
 ["FlipBias","ดูการกลับ",(s)=>cnt(s.slice(-5),'B')%2?'P':'B'],
 ["Window6","หน้าต่าง6",(s)=>cnt(s.slice(-6),'B')>=4?'B':'P'],
 ["Window8","หน้าต่าง8",(s)=>cnt(s.slice(-8),'P')>=5?'P':'B'],
 ["Echo","สะท้อน",(s)=>s.length>2?s[s.length-3]:lastOf(s)],
 ["Inertia","แรงค้าง",(s)=>cnt(s.slice(-4),lastOf(s))>=3?lastOf(s):opp(lastOf(s))],
 ["Parity","เลขคู่",(s)=>s.length%2?lastOf(s):opp(lastOf(s))],
 ["Ratio","อัตราส่วน",(s)=>cnt(s,'B')/(cnt(s,'P')+1)>1.15?'B':'P'],
 ["Pulse","ชีพจร",(s)=>cnt(s.slice(-10),'B')===cnt(s.slice(-10),'P')?lastOf(s):opp(lastOf(s))],

 ["Wave","คลื่น",(s)=>cnt(s.slice(-7),'B')>cnt(s.slice(-7),'P')?'P':'B'],
 ["Rebound","เด้งกลับ",(s)=>s.slice(-2)[0]===s.slice(-2)[1]?opp(lastOf(s)):lastOf(s)],
 ["Density","ความหนา",(s)=>cnt(s.slice(-9),lastOf(s))>=6?opp(lastOf(s)):lastOf(s)],
 ["Shadow","เงาหลัง",(s)=>s.length>1?opp(s[s.length-2]):lastOf(s)],
 ["Drift","ไหล",(s)=>cnt(s.slice(-12),'B')>cnt(s.slice(-12),'P')?'B':'P'],
 ["Anchor","จุดยึด",(s)=>cnt(s.slice(-5),'B')===3?'B':'P'],
 ["Snap","หักฉับ",(s)=>cnt(s.slice(-4),'B')===2?opp(lastOf(s)):lastOf(s)],
 ["Swing","แกว่ง",(s)=>cnt(s.slice(-6),'P')>=4?'B':'P'],
 ["Focus","โฟกัส",(s)=>cnt(s.slice(-3),'B')>=2?'B':'P'],
 ["Mirror2","กระจก2",(s)=>s.length>3?s[s.length-4]:lastOf(s)],
 ["Pressure","แรงกด",(s)=>cnt(s.slice(-8),'B')>=6?'P':'B'],
 ["Tilt","เอียง",(s)=>cnt(s.slice(-10),'P')-cnt(s.slice(-10),'B')>=3?'P':'B'],
 ["Edge","ขอบ",(s)=>cnt(s.slice(-11),'B')%3?'B':'P'],
 ["Stability","เสถียร",(s)=>cnt(s.slice(-6),lastOf(s))>=4?lastOf(s):opp(lastOf(s))]
]

function analyze(){

  let s = history.filter(x => x !== 'T')

  analysisGrid.innerHTML = ""

  if(s.length < 6){
    summary.textContent = "📊 รอข้อมูล..."

    document.getElementById("premiumPick").innerHTML = "-";
    document.getElementById("premiumDetail").innerHTML = "รอข้อมูล...";
    document.getElementById("premiumPercent").innerText = "";

    return
  }

  /* ===== วิเคราะห์ 24 สาย ===== */

  let maxAcc = Math.max(...dna.map(acc))
  let pCountAll = 0
  let bCountAll = 0

  strategyDefs.forEach((def,i)=>{

     let pick = def[2](s)
     last[i] = pick

     if(acc(dna[i]) === maxAcc){
        if(pick === 'P') pCountAll++
        if(pick === 'B') bCountAll++
     }

     analysisGrid.innerHTML += `
     <div class="analysis">
        <h3>${i+1}) ${def[0]}</h3>
        <div class="desc">${def[1]}</div>
        <div>ตัวแทง:
           <span class="${acc(dna[i])===maxAcc?'best':''}">${pick}</span>
        </div>
        <div class="per">ความแม่นยำ: ${acc(dna[i])}%</div>
        <div class="dna-row">${dna[i].join(" ")}</div>
     </div>`
  })

  summary.innerHTML =
  `📊 <b>เงื่อนไข</b><br>
  สาย % สูงสุด = ${maxAcc}%<br>
  P = ${pCountAll} สาย<br>
  B = ${bCountAll} สาย`

  /* ===== PREMIUM PROGRAM LOGIC ===== */

  let minLose = Infinity;
  let premiumList = [];

  strategyDefs.forEach((def,i)=>{

     let streak = 0;
     let maxStreak = 0;

     dna[i].forEach(x=>{
        if(x==='❌'){
           streak++;
           if(streak > maxStreak) maxStreak = streak;
        }else{
           streak = 0;
        }
     });

     if(maxStreak < minLose){
        minLose = maxStreak;
        premiumList = [{pick:last[i], index:i}];
     }
     else if(maxStreak === minLose){
        premiumList.push({pick:last[i], index:i});
     }

  });
if(premiumList.length){

  let pCount = premiumList.filter(x=>x.pick==='P').length;
  let bCount = premiumList.filter(x=>x.pick==='B').length;

  let finalPick = "-";
  let className = "";

  if(pCount>bCount){
    finalPick="P";
    className="premium-p";
  }else if(bCount>pCount){
    finalPick="B";
    className="premium-b";
  }else{
    finalPick = premiumList[0].pick;
    className = finalPick==='P'?'premium-p':'premium-b';
  }

  let strategyNames = premiumList.map(x=>{
    return `${x.index+1}) ${strategyDefs[x.index][0]} (${acc(dna[x.index])}%)`
  }).join("<br>");

  document.getElementById("premiumPick").innerHTML =
    `<span class="${className}">${finalPick}</span>`;
   lastPremiumPick = finalPick 

  document.getElementById("premiumDetail").innerHTML =
    `สายที่เคยแพ้ติดกันน้อยสุด = ${minLose} ครั้ง<br>
     P = ${pCount} สาย | B = ${bCount} สาย<br><br>
     🔎 มาจากสาย:<br>${strategyNames}`;

  document.getElementById("premiumPercent").innerText =
    `รวมทั้งหมด ${premiumList.length} สาย`;
    // ✅ คำนวณ % จริงของ Premium
let premiumAcc = acc(premiumHistory)

// ✅ แสดง % เพิ่มเข้าไป
document.getElementById("premiumPercent").innerText +=
  ` | 🎯 แม่นจริง ${premiumAcc}%`


  /* ===== 🔥 PREMIUM DNA GRID (ผสานแล้ว) ===== */

  let dnaHTML = "";

  let d = premiumHistory.slice(-30)

// เติมให้ครบ 30 ช่อง
let fill = 30 - d.length
if(fill > 0){
  d = Array(fill).fill(null).concat(d)
}

let grid = `<div class="premium-dna-grid">`

d.forEach(v=>{
  if(v === '✅'){
    grid += `<div class="dna-cell dna-win">✓</div>`
  }
  else if(v === '❌'){
    grid += `<div class="dna-cell dna-lose">✕</div>`
  }
  else{
    grid += `<div class="dna-cell" style="opacity:.15">-</div>`
  }
})

grid += `</div>`
